name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest with coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: run tests
        run: uv run python -m pytest test/ -v --cov=ao3downloader --cov-report=term-missing --cov-fail-under=60
