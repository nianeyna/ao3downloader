name: publish documentation

on: workflow_dispatch

permissions:
  pages: write
  contents: read
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: build
        uses: withastro/action@v6
        with:
          package-manager: pnpm
          path: ./site

      - name: deploy
        uses: actions/deploy-pages@v4
