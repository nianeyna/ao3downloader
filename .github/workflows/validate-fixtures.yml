name: validate ao3 fixtures

on:
  schedule:
    # midnight every friday (utc - equals afternoon on thursday pacific)
    # according to 2025 stats thursday and friday have the lowest traffic
    - cron: '0 0 * * FRI'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate:
    name: validate fixtures against live ao3
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: refresh fixtures
        env:
          AO3_USERNAME: ${{ secrets.AO3_USERNAME }}
          AO3_PASSWORD: ${{ secrets.AO3_PASSWORD }}
        run: uv run python dev/refresh_fixtures.py --require-login

      - name: check for changes
        id: changes
        run: |
          if git diff --quiet test/fixtures/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # region pass 1 — verify the newly-refreshed live fixtures still parse on their own.
      # AO3_FIXTURE_MODE=current_only hides archived versions, so test failures here
      # mean a freshly-downloaded file broke something — either snapshot drift (fixed
      # by --snapshot-update) or a real format change (requires parser fix + archive).

      - name: pass 1 — live fixtures only
        if: steps.changes.outputs.changed == 'true'
        id: pass1
        continue-on-error: true
        env:
          AO3_FIXTURE_MODE: current_only
        run: uv run python -m pytest test/ -v

      - name: update snapshots
        if: steps.pass1.outcome == 'failure'
        continue-on-error: true
        run: uv run python -m pytest test/ --snapshot-update

      - name: pass 1 — retry after snapshot update
        if: steps.pass1.outcome == 'failure'
        id: pass1-retry
        continue-on-error: true
        env:
          AO3_FIXTURE_MODE: current_only
        run: uv run python -m pytest test/ -v

      # endregion

      # region pass 2 - archive old ebook versions on structural break.
      # pass 1 failed even after snapshot update -> the live format changed in a way
      # the parser cannot handle. preserve the pre-refresh (working) ebooks under
      # archive/ so the human fix can be regression-tested against them.

      - name: archive pre-refresh ebook fixtures
        if: steps.pass1.outcome == 'failure' && steps.pass1-retry.outcome == 'failure'
        run: uv run python dev/archive_old_fixtures.py

      - name: pass 2 — full suite (current + archive)
        if: steps.pass1.outcome == 'failure' && steps.pass1-retry.outcome == 'failure'
        id: pass2
        continue-on-error: true
        run: uv run python -m pytest test/ -v

      # endregion

      - name: create branch and commit
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b automated/refresh-ao3-fixtures
          git add test/fixtures/ test/__snapshots__/
          git commit -m "Update AO3 test fixtures (automated)"
          git push --force origin automated/refresh-ao3-fixtures

      - name: create or update success pr
        if: >-
          steps.changes.outputs.changed == 'true' &&
          (steps.pass1.outcome == 'success' || steps.pass1-retry.outcome == 'success')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_issue=$(gh issue list --label "ao3-fixtures" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing_issue" ]; then
            gh issue close "$existing_issue" --comment "Resolved by updated fixtures."
          fi

          existing_pr=$(gh pr list --head "automated/refresh-ao3-fixtures" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --body "$(cat <<'EOF'
          ## Summary
          - Weekly fixture refresh detected changes in AO3's HTML
          - All tests pass (snapshots updated if needed)
          - Please review the fixture diffs before merging

          *Automated by validate-fixtures workflow*
          EOF
          )"
          else
            gh pr create \
              --title "Update AO3 test fixtures" \
              --label "ao3-fixtures" \
              --body "$(cat <<'EOF'
          ## Summary
          - Weekly fixture refresh detected changes in AO3's HTML
          - All tests pass (snapshots updated if needed)
          - Please review the fixture diffs before merging

          *Automated by validate-fixtures workflow*
          EOF
          )"
          fi

      - name: create or update failure pr and issue
        if: >-
          steps.changes.outputs.changed == 'true' &&
          steps.pass1-retry.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr=$(gh pr list --head "automated/refresh-ao3-fixtures" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "Update AO3 test fixtures (FAILING)" --body "$(cat <<'EOF'
          ## Summary
          - Weekly fixture refresh detected changes in AO3's HTML
          - **Tests are failing** even after snapshot update — parser likely needs to be fixed
          - Pre-refresh ebook versions have been preserved under `test/fixtures/ebook/*/archive/`
            so the fix can be regression-tested against them
          - See the workflow run for details

          *Automated by validate-fixtures workflow*
          EOF
          )"
          else
            gh pr create \
              --title "Update AO3 test fixtures (FAILING)" \
              --label "ao3-fixtures" \
              --body "$(cat <<'EOF'
          ## Summary
          - Weekly fixture refresh detected changes in AO3's HTML
          - **Tests are failing** even after snapshot update — parser likely needs to be fixed
          - Pre-refresh ebook versions have been preserved under `test/fixtures/ebook/*/archive/`
            so the fix can be regression-tested against them
          - See the workflow run for details

          *Automated by validate-fixtures workflow*
          EOF
          )"
          fi

          existing_issue=$(gh issue list --label "ao3-fixtures" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body "Still failing as of workflow run ${{ github.run_id }}"
          else
            gh issue create \
              --title "AO3 HTML/ebook structure change detected" \
              --label "ao3-fixtures" \
              --body "$(cat <<'EOF'
          The weekly fixture refresh detected changes in AO3 output that break parsing logic.

          Tests are still failing after automatic snapshot update — this likely means AO3 changed
          the structure of HTML pages or ebook format output that the parsers depend on.

          If the failing test is an ebook structural test, the prior (working) version of each
          affected ebook fixture has been copied to `test/fixtures/ebook/<work_id>/archive/`
          with a content-hash filename. The archived version should continue to pass after the
          parser is updated — this guards against regressions on users' older downloads.

          Check the validate-fixtures workflow runs for details.
          EOF
          )"
          fi
